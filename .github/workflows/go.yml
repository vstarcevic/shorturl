# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go build, test and deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.out

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-shorturl
      cancel-in-progress: false

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.22'
    - name: Build
      run: |
        cd cmd/shorturl
        go build -o ../../shorturl

    - name: Build binary
      run: |
        cd cmd/shorturl
        CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o shorturl
        echo "Binary built successfully"

    - name: Backup and stop service
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST}}
        username: ${{ secrets.USERNAME}}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.PORT}}
        script: |
          echo "Stopping service..."
          sudo systemctl stop shorturl-service.service
          echo "Backing up old binary..."
          mv /home/${{ secrets.USERNAME }}/shorturl/shorturl /home/${{ secrets.USERNAME }}/shorturl/shorturl.bak.$(date +%Y%m%d_%H%M%S)

    - name: Deploy binary via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.PORT}}
        source: "shorturl"
        target: "/home/${{ secrets.USERNAME }}/shorturl/"

    - name: Deploy and verify
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.PORT }}
        script: |
          sudo /usr/bin/systemctl restart shorturl-service.service
          sleep 5
          curl -f http://localhost:8080/health || exit 1
